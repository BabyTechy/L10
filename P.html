<!DOCTYPE html>
<html>

<head>
    <title>Navbar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .topnav {
            overflow: hidden;
            background-color: #ff0000;
        }

        .topnav a {
            float: left;
            color: #00ff37;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }

        .topnav a:hover {
            background-color: #1100ff;
            color: rgb(255, 255, 255);
        }

        .topnav a.active {
            background-color: #d900ff;
            color: rgb(255, 136, 0);
        }
    </style>
</head>

<body>
    <div class="topnav">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
        <a href="#services">Services</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#blog">Blog</a>
        <a href="#contact">Contact</a>
        <a href="#faq">FAQ</a>
        <a href="#login">Login</a>
        <a href="#register">Register</a>
    </div>
    <h1>Welcome to TechyCrewworld</h1>
    <p>This is TechyCrew.</p>
</body>
</style>
</head>

        <a href="#news">About_Us</a>
        <a href="#contact">Gallery</a>
        <a href="#about">Contact_Us</a>
    </div>

</body>

</html>
</html>
